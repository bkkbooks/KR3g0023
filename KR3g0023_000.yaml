body:
  text: 青囊奧語唐楊筠松撰坤壬乙巨門從頭出艮丙辛位位是破軍㢲辰亥盡是武曲位甲癸申貪狼一路行左為陽子丑至戌亥右為隂午巳至申未雌與雄交㑹合元空雄與雌元空卦內推山與水須要明此理水與山禍福盡相關明元空只在五行中知此法不須尋納甲顛顛倒二十四山有珠寶逆順行二十四山有火坑認金龍一經一緯義不窮動不動直待髙人施妙用第一義要識龍身行與止第二元來脉明堂不可偏第三法傳送功曺不髙壓第四竒明堂十字有元微第五妙前後青龍兩相照第六祕八國城門鎖正氣第七奧要向天心尋十道第八裁屈曲流神認去來第九神任他平地與侵雲第十真若有一缺非真情明倒杖卦坐隂陽何必想識掌模太極分明必有圗知化氣生克制化須熟記說五星方圓尖秀要分明曉髙低星峯須辨得元微鬼與曜生死去來真要妙向放水生旺有吉休囚否二十四山分五方知得榮枯死與生翻天倒地對不同其中祕密在元空認龍立穴要分明在人仔細辨天心天星既辨穴何難但把向中放水看從外生入名為進定知財寶積如山從內生出名為退家內錢財皆廢盡生入剋入名為旺子孫髙官盡富貴脉息生旺要知因龍歇脉寒災禍臨縱有他山來救助空勞祿馬護龍行勸君再把星辰辨吉凶禍福如神見識得此篇真妙微又見郭璞再出現青􅌩奧語
